<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Course Tracker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="container">

    <div class="header">
      <div class="menu">☰</div>
      <div class="logo">Any Logo</div>
    </div>

    <div class="card">
      <h2>Create Account</h2>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="full_name" placeholder="Enter full name" />
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
      </div>

      <button class="btn" type="button" onclick="handleSignup()">Sign Up</button>

      <p class="login-text">
        Already have an account?
        <span>Login</span>
      </p>
    </div>

    <h2 class="section-title">Available Courses</h2>
    <div id="courses"></div>

    <h2 class="section-title">Topics</h2>
    <div id="topics"></div>

  </div>

  <script src="/static/script-v3.js"></script>
  <script src="/static/signup.js"></script>
</body>
</html>
